spring.application.name=belajarspringboot

spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/belajardb}
spring.datasource.username=${APP_DB_USERNAME:postgres}
spring.datasource.password=${APP_DB_PASSWORD:rahasia}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
app.security.jwt-secret=${APP_JWT_SECRET:change-this-development-secret-key-to-a-long-random-value-1234567890}
app.security.jwt-expiration-hours=${APP_JWT_EXPIRATION_HOURS:24}
app.security.refresh-token-expiration-days=${APP_REFRESH_TOKEN_EXPIRATION_DAYS:14}

app.admin.bootstrap-enabled=${APP_ADMIN_BOOTSTRAP_ENABLED:true}
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.email=${APP_ADMIN_EMAIL:admin@local.dev}
app.admin.password=${APP_ADMIN_PASSWORD:Admin12345}
app.admin.full-name=${APP_ADMIN_FULL_NAME:System Administrator}