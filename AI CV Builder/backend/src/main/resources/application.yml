spring:
  application:
    name: ai-cv-builder
  datasource:
    url: jdbc:postgresql://localhost:5432/aicvbuilder
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  jackson:
    serialization:
      indent-output: true

server:
  port: 8080
  servlet:
    context-path: /api

azure:
  openai:
    api-key: ${AZURE_OPENAI_API_KEY}
    endpoint: ${AZURE_OPENAI_ENDPOINT}
    deployment-name: ${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-35-turbo}

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
